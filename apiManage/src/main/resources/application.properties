spring.application.name=lvyoubaba-api


spring.datasource.url=jdbc:mysql://localhost:3306/lvyoubaba?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
spring.datasource.username=lvyoubaba
spring.datasource.password=lvyoubaba
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.pool-name=HikariPool-1
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.connection-test-query=SELECT 1


mybatis-plus.mapper-locations=classpath*:/mapper/**/*.xml
mybatis-plus.type-aliases-package=org.example.apimanage.entity
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl
mybatis-plus.global-config.db-config.id-type=auto
mybatis-plus.global-config.db-config.logic-delete-field=deleted
mybatis-plus.global-config.db-config.logic-delete-value=1
mybatis-plus.global-config.db-config.logic-not-delete-value=0


server.port=8080

# ============================================
# ж–Үд»¶дёҠдј й…ҚзҪ®
# ============================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=100MB
spring.servlet.multipart.file-size-threshold=0


logging.level.root=INFO
logging.level.org.example.apimanage=DEBUG
logging.level.org.mybatis=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n


minio.endpoint=http://122.51.82.23:9000
minio.access-key=admin
minio.secret-key=yzxuc123456admin
minio.bucket-name=lvyoubaba

# ============================================
# AI API й…ҚзҪ®пјҲOpenAI е…је®№ж јејҸпјү
# ============================================
# ж”ҜжҢҒпјҡOpenAIгҖҒClaudeгҖҒDeepSeekгҖҒMiMoгҖҒSiliconFlow зӯүд»»дҪ• OpenAI е…је®№ API
ai.api.key=${AI_API_KEY:your-api-key-here}
ai.api.base-url=${AI_API_BASE_URL:https://api.openai.com/v1}
ai.api.model=${AI_API_MODEL:gpt-4o}
ai.api.timeout=30000

# ============================================
# JWT й…ҚзҪ®
# ============================================
jwt.secret=${JWT_SECRET:your-256-bit-secret-key-for-jwt-signing}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ============================================
# Redis й…ҚзҪ®
# ============================================
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
spring.data.redis.timeout=2000ms
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=0

# ============================================
# йҷҗжөҒй…ҚзҪ®
# ============================================
rate.limit.ai.enabled=true
rate.limit.ai.capacity=10
rate.limit.ai.refill-rate=1

# ============================================
# Actuator зӣ‘жҺ§й…ҚзҪ®
# ============================================
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.metrics.export.prometheus.enabled=true
management.metrics.tags.application=lvyoubaba-api